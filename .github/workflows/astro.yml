# Sample workflow for building and deploying an Astro site using Docker
#
# To get started with Astro see: https://docs.astro.build/en/getting-started/
#
name: Deploy Astro site to Production (Docker)

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: '20.x'
  PORT: 5001
  DEPLOY_PATH: '/var/www/radit-porto-web'
  APP_NAME: 'radit-porto-web'
  DOCKER_IMAGE_NAME: 'radit-porto-web'
  DOCKER_CONTAINER_NAME: 'radit-porto-web-container'

jobs:
  deploy:
    name: Deploy to Production (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Copy files to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: "${{ env.DEPLOY_PATH }}"
          rm: true
          
      - name: Deploy Docker Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: "30m"
          script: |
            set -e
            
            echo "=== Starting Docker-based deployment ==="
            
            # Navigate to deploy directory
            cd ${{ env.DEPLOY_PATH }}
            
            # Stop and remove existing container
            echo "Stopping and removing existing container..."
            docker stop ${{ env.DOCKER_CONTAINER_NAME }} || true
            docker rm ${{ env.DOCKER_CONTAINER_NAME }} || true
            
            # Remove existing image
            echo "Removing existing Docker image..."
            docker rmi ${{ env.DOCKER_IMAGE_NAME }} || true
            
            # Clean up any dangling images
            echo "Cleaning up dangling images..."
            docker image prune -f || true
            
            # Build new Docker image
            echo "Building new Docker image..."
            docker build -t ${{ env.DOCKER_IMAGE_NAME }} .
            
            # Run new container
            echo "Running new Docker container..."
            docker run -d \
              --name ${{ env.DOCKER_CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.PORT }}:4321 \
              -e HOST=0.0.0.0 \
              -e PORT=4321 \
              -e BASE_URL=/ \
              ${{ env.DOCKER_IMAGE_NAME }}
            
            # Wait for container to start
            echo "Waiting for container to start..."
            sleep 10
            
            # Check container status
            echo "Checking container status..."
            docker ps -a | grep ${{ env.DOCKER_CONTAINER_NAME }}
            
            # Check container logs
            echo "Container logs:"
            docker logs ${{ env.DOCKER_CONTAINER_NAME }} --tail 20 || true
            
            # Test application health
            echo "Testing application health..."
            for i in {1..10}; do
              if curl -f http://127.0.0.1:${{ env.PORT }}/ > /dev/null 2>&1; then
                echo "✅ Application is healthy and responding"
                break
              else
                echo "⏳ Waiting for application to be ready... (attempt $i/10)"
                sleep 5
              fi
            done
            
            # Display container information
            echo "Container information:"
            docker inspect ${{ env.DOCKER_CONTAINER_NAME }} | grep -E "(Status|IPAddress|PortBindings)" || true
            
            # Show running containers
            echo "Running containers:"
            docker ps
            
            echo "=== Docker deployment completed successfully! ==="
            echo "🌐 Application URL: http://43.134.87.90:${{ env.PORT }}"
            echo "📋 Container Status: docker ps"
            echo "📝 Container Logs: docker logs ${{ env.DOCKER_CONTAINER_NAME }}"
            echo "🔧 Container Shell: docker exec -it ${{ env.DOCKER_CONTAINER_NAME }} sh"
