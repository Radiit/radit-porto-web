# Sample workflow for building and deploying an Astro site to GitHub Pages
#
# To get started with Astro see: https://docs.astro.build/en/getting-started/
#
name: Deploy Astro site to Production

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: '20.x'
  PORT: 5001
  DEPLOY_PATH: '/var/www/radit-porto-web'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/,package.json,package-lock.json,astro.config.mjs"
          target: "${{ env.DEPLOY_PATH }}"
          rm: true
          
      - name: Configure and Start Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            echo "Setting up PM2 globally first..."
            npm install -g pm2@latest

            echo "Stopping existing PM2 processes..."
            pm2 delete radit-porto-web || true
            pm2 kill || true

            echo "Cleaning up port 5001..."
            if lsof -Pi :5001 -sTCP:LISTEN -t >/dev/null ; then
              kill -9 $(lsof -t -i:5001) || true
            fi

            echo "Ensuring deploy directory exists..."
            mkdir -p ${{ env.DEPLOY_PATH }}
            cd ${{ env.DEPLOY_PATH }}

            echo "Installing production dependencies..."
            npm ci --omit=dev

            echo "Updating package.json scripts..."
            node -e '
              const fs = require("fs");
              const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
              if (!pkg.scripts) pkg.scripts = {};
              pkg.scripts.preview = "astro preview --host 127.0.0.1 --port 5001";
              fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
            '

            echo "Creating PM2 ecosystem file..."
            cat > ecosystem.config.cjs << 'EOL'
            module.exports = {
              apps: [{
                name: 'radit-porto-web',
                cwd: '/var/www/radit-porto-web',
                script: 'npm',
                args: 'run preview',
                env: {
                  NODE_ENV: 'production',
                  PORT: '5001'
                },
                watch: false,
                autorestart: true
              }]
            }
            EOL

            echo "Starting application with PM2..."
            pm2 start ecosystem.config.cjs

            echo "Saving PM2 configuration..."
            pm2 save --force

            echo "Setting up PM2 startup..."
            env PATH=$PATH:/usr/bin pm2 startup systemd -u root --hp /root || true
            systemctl enable pm2-root || true

            echo "Waiting for application to start..."
            sleep 10

            echo "Checking application status..."
            pm2 list
            pm2 logs --lines 20 || true
            
            echo "Checking port status..."
            netstat -tlpn | grep 5001 || true
            
            echo "Checking application logs..."
            tail -n 50 /root/.pm2/logs/radit-porto-web-error.log || true
            tail -n 50 /root/.pm2/logs/radit-porto-web-out.log || true
            
            echo "Deployment complete!"
