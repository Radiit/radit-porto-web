# Sample workflow for building and deploying an Astro site to GitHub Pages
#
# To get started with Astro see: https://docs.astro.build/en/getting-started/
#
name: Deploy Astro site to Production

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: '20.x'
  PORT: 5001
  DEPLOY_PATH: '/var/www/radit-porto-web'
  HOST: 'radit.is-a.dev'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/,package.json,package-lock.json,astro.config.mjs"
          target: "${{ env.DEPLOY_PATH }}"
          rm: true
          
      - name: Configure and Start Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Navigate to project directory
            cd ${{ env.DEPLOY_PATH }}

            # Cleanup old files but keep necessary ones
            find . -maxdepth 1 ! -name 'dist' ! -name 'package.json' ! -name 'package-lock.json' ! -name 'astro.config.mjs' ! -name '.' ! -name '..' -exec rm -rf {} +

            # Install production dependencies
            npm ci --production

            # Install PM2 globally if not present
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Create package.json script for preview
            node -e '
              const fs = require("fs");
              const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
              if (!pkg.scripts) pkg.scripts = {};
              pkg.scripts.preview = "astro preview --host 127.0.0.1 --port 5001";
              fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
            '

            # Stop any existing process
            pm2 delete radit-porto-web || true
            
            # Clean up any old processes on port 5001
            if lsof -Pi :5001 -sTCP:LISTEN -t >/dev/null ; then
              kill -9 $(lsof -t -i:5001) || true
            fi

            # Start with PM2 using npm
            NODE_ENV=production pm2 start npm --name "radit-porto-web" -- run preview

            # Save PM2 configuration
            pm2 save --force

            # Setup PM2 to start on system boot and run the generated command
            sudo env PATH=$PATH:/usr/bin pm2 startup systemd -u root --hp /root
            sudo systemctl enable pm2-root

            # Verify the process is running
            pm2 list
            
            # Check if the port is listening
            netstat -tlpn | grep 5001
