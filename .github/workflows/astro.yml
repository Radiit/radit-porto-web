# Sample workflow for building and deploying an Astro site using Docker Compose
#
# To get started with Astro see: https://docs.astro.build/en/getting-started/
#
name: Deploy Astro site to Production (Docker Compose)

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: '20.x'
  PORT: 5001
  DEPLOY_PATH: '/var/www/radit-porto-web'
  APP_NAME: 'radit-porto-web'
  DOCKER_IMAGE_NAME: 'radit-porto-web'

jobs:
  deploy:
    name: Deploy to Production (Docker Compose)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Copy files to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: "${{ env.DEPLOY_PATH }}"
          rm: true
          
      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "43.134.87.90"
          username: "root"
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: "30m"
          script: |
            set -e
            
            echo "=== Starting Docker Compose deployment ==="
            
            # Navigate to deploy directory
            cd ${{ env.DEPLOY_PATH }}
            
            # Stop and remove all containers from docker-compose
            echo "Stopping existing containers..."
            docker-compose -f docker-compose.simple.yml down || true
            
            # Remove ALL containers that might conflict (nuclear option)
            echo "Removing all containers with radit-porto-web in name..."
            docker ps -a | grep "radit-porto-web" | awk '{print $1}' | xargs -r docker rm -f || true
            
            # Remove existing images
            echo "Removing existing images..."
            docker rmi ${{ env.DOCKER_IMAGE_NAME }} || true
            docker rmi radit-porto-web_astro-app || true
            docker rmi radit-porto-web-astro-app || true
            
            # Clean up any dangling images and containers
            echo "Cleaning up dangling images and containers..."
            docker image prune -f || true
            docker container prune -f || true
            
            # Build and start with docker-compose (will generate unique names)
            echo "Building and starting with docker-compose..."
            docker-compose -f docker-compose.simple.yml up -d --build
            
            # Wait for containers to start
            echo "Waiting for containers to start..."
            sleep 15
            
            # Check container status
            echo "Checking container status..."
            docker-compose -f docker-compose.simple.yml ps
            
            # Check container logs
            echo "Container logs:"
            docker-compose -f docker-compose.simple.yml logs --tail 20 || true
            
            # Test application health
            echo "Testing application health..."
            for i in {1..10}; do
              if curl -f http://127.0.0.1:${{ env.PORT }}/ > /dev/null 2>&1; then
                echo "✅ Application is healthy and responding"
                break
              else
                echo "⏳ Waiting for application to be ready... (attempt $i/10)"
                sleep 5
              fi
            done
            
            # Display container information
            echo "Container information:"
            docker-compose -f docker-compose.simple.yml ps
            docker-compose -f docker-compose.simple.yml logs --tail 10
            
            echo "=== Docker Compose deployment completed successfully! ==="
            echo "🌐 Application URL: https://radit.is-a.dev"
            echo "📋 Container Status: docker-compose -f docker-compose.simple.yml ps"
            echo "📝 Container Logs: docker-compose -f docker-compose.simple.yml logs"
            echo "🔧 Container Shell: docker-compose -f docker-compose.simple.yml exec astro-app sh"
