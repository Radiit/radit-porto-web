version: '3.8'

services:
  # Astro application only
  astro-app:
    build: .
    restart: unless-stopped
    ports:
      - "5001:4321"  # Expose port 5001 for existing Nginx proxy
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      - BASE_URL=/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 